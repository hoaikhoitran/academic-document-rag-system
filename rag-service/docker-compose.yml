version: "3.9"

services:
  rag-api:
    build: .
    container_name: rag-prn222
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist ChromaDB and uploaded documents on the host filesystem
      # so they survive container rebuilds.
      - ./chroma_db:/app/chroma_db
      - ./storage:/app/storage
    restart: unless-stopped
